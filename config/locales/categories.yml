# Default category labels (seeded at user creation) and category flash messages.
en:
  activity:
    category:
      defaults:
        reading: Reading
        cooking: Cooking
        leisure: Leisure
        outings: Outings
        work: Work
        sleep: Sleep
    categories:
      flash:
        created: Category created
        updated: Categories updated
        destroyed: Category deleted
        destroy_failed: This category cannot be deleted
  activities:
    categories:
      transfer_activities_modal:
        title: Delete category
        close: Close
        hint: '"%{label}" is linked to activities. What would you like to do?'
        transfer_option: Transfer its activities to another category
        delete_option: Delete all its activities
        cancel: Cancel
        submit: Confirm
fr:
  activity:
    category:
      defaults:
        reading: Lecture
        cooking: Cuisine
        leisure: Loisirs
        outings: Sorties
        work: Travail
        sleep: Sommeil
    categories:
      flash:
        created: Catégorie créée
        updated: Catégories mises à jour
        destroyed: Catégorie supprimée
        destroy_failed: Impossible de supprimer cette catégorie
  activities:
    categories:
      transfer_activities_modal:
        title: Supprimer la catégorie
        close: Fermer
        hint: '« %{label} » est liée à des activités. Que souhaitez-vous faire ?'
        transfer_option: Transférer ses activités vers une autre catégorie
        delete_option: Supprimer toutes ses activités
        cancel: Annuler
        submit: Confirmer
